<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#d8ceb2">
  <title>Tom Riddle's Diary</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main id="diary" aria-label="Tom Riddle's diary">
    <canvas id="paper"></canvas>
    <div id="blot" aria-hidden="true"></div>
    <div id="hint">Write on the page…</div>
    <button id="fullscreen" type="button" aria-label="进入全屏">◇</button>
    <section id="setup" role="dialog" aria-modal="true" aria-labelledby="setup-title" hidden>
      <form id="setup-form">
        <div class="setup-mark">T. M. R.</div>
        <h1 id="setup-title">Awaken the diary</h1>
        <p>Enter a Kimi API key. It stays on this tablet.</p>
        <label for="api-key">API key</label>
        <input id="api-key" name="api-key" type="password" autocomplete="off" spellcheck="false" placeholder="sk-…" required minlength="12">
        <div id="setup-error" role="alert"></div>
        <button id="save-key" type="submit">Bind the secret</button>
      </form>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
